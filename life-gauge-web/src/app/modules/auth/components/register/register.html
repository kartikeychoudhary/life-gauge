<div class="min-h-screen flex items-center justify-center bg-slate-950 px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-blue-600 mb-4">
        <i class="pi pi-heart text-white text-2xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-white">Create Account</h1>
      <p class="text-slate-400 mt-1">Start monitoring your health</p>
    </div>

    <p-card styleClass="!bg-slate-900 !border !border-slate-700/50 !shadow-2xl">
      <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-5">
        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium text-slate-300">Full Name</label>
          <input pInputText type="text" formControlName="name" placeholder="Your name" class="w-full" />
          <small *ngIf="form.get('name')?.invalid && form.get('name')?.touched" class="text-red-400">
            Name must be at least 2 characters
          </small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium text-slate-300">Email</label>
          <input pInputText type="email" formControlName="email" placeholder="you@example.com" class="w-full" />
          <small *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="text-red-400">
            Valid email required
          </small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium text-slate-300">Password</label>
          <p-password
            formControlName="password"
            placeholder="Min 8 characters"
            [toggleMask]="true"
            styleClass="w-full"
            inputStyleClass="w-full"
          />
          <small *ngIf="form.get('password')?.invalid && form.get('password')?.touched" class="text-red-400">
            Password must be at least 8 characters
          </small>
        </div>

        <p-button
          type="submit"
          label="Create Account"
          icon="pi pi-user-plus"
          styleClass="w-full"
          [loading]="loading"
          [disabled]="form.invalid"
        />
      </form>

      <p class="text-center text-slate-400 text-sm mt-4">
        Already have an account?
        <a routerLink="/auth/login" class="text-blue-400 hover:text-blue-300 ml-1">Sign in</a>
      </p>
    </p-card>
  </div>
</div>
