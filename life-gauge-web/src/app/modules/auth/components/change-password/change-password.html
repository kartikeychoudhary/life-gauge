<div class="min-h-screen flex items-center justify-center bg-slate-950 px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-amber-600 mb-4">
        <i class="pi pi-lock text-white text-2xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-white">Change Password</h1>
      <p class="text-slate-400 mt-1">You must change your password before continuing.</p>
    </div>

    <p-card styleClass="!bg-slate-900 !border !border-slate-700/50 !shadow-2xl">
      <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-5">
        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium text-slate-300">Current Password</label>
          <p-password
            formControlName="current_password"
            placeholder="Your current password"
            [feedback]="false"
            [toggleMask]="true"
            styleClass="w-full"
            inputStyleClass="w-full"
          />
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium text-slate-300">New Password</label>
          <p-password
            formControlName="new_password"
            placeholder="Min 8 characters"
            [feedback]="true"
            [toggleMask]="true"
            styleClass="w-full"
            inputStyleClass="w-full"
          />
          <small *ngIf="form.get('new_password')?.invalid && form.get('new_password')?.touched" class="text-red-400">
            Minimum 8 characters required
          </small>
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium text-slate-300">Confirm New Password</label>
          <p-password
            formControlName="confirm_password"
            placeholder="Repeat new password"
            [feedback]="false"
            [toggleMask]="true"
            styleClass="w-full"
            inputStyleClass="w-full"
          />
          <small *ngIf="passwordMismatch" class="text-red-400">
            Passwords do not match
          </small>
        </div>

        <p-button
          type="submit"
          label="Change Password"
          icon="pi pi-check"
          styleClass="w-full"
          [loading]="loading"
          [disabled]="form.invalid || passwordMismatch"
        />
      </form>
    </p-card>
  </div>
</div>
