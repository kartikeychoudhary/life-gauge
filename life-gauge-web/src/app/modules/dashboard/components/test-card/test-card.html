<div class="bg-slate-800/60 border border-slate-700/50 rounded-xl p-4 flex flex-col gap-3 hover:border-slate-600 transition-colors group">

  <!-- Top row: name + flag + info -->
  <div class="flex items-start justify-between gap-2">
    <span class="text-xs font-medium text-slate-400 leading-tight">{{ test.display_name }}</span>
    <div class="flex items-center gap-1.5 shrink-0">
      <p-tag
        [value]="flagLabel"
        [severity]="flagSeverity"
        styleClass="text-xs px-2 py-0.5"
      />
      <button
        class="w-6 h-6 rounded-full flex items-center justify-center text-slate-500 hover:text-blue-400 hover:bg-blue-400/10 transition-colors opacity-0 group-hover:opacity-100"
        (click)="infoClick.emit()"
        pTooltip="View history"
        tooltipPosition="top"
      >
        <i class="pi pi-info-circle text-xs"></i>
      </button>
    </div>
  </div>

  <!-- Value -->
  <div class="flex items-end gap-2">
    <span class="text-2xl font-bold text-white leading-none">{{ test.value_text }}</span>
    <span *ngIf="test.unit" class="text-sm text-slate-400 mb-0.5">{{ test.unit }}</span>
    <span *ngIf="trendIcon" class="mb-0.5 ml-auto">
      <i [class]="trendIcon + ' text-sm ' + trendClass"></i>
    </span>
  </div>

  <!-- Reference range bar -->
  <div *ngIf="hasRange && test.value_numeric !== null" class="space-y-1">
    <div class="h-1.5 bg-slate-700 rounded-full overflow-hidden">
      <div
        class="h-full rounded-full transition-all"
        [class.bg-green-500]="test.flag === 'normal'"
        [class.bg-red-500]="test.flag === 'high' || test.flag === 'abnormal'"
        [class.bg-yellow-500]="test.flag === 'low'"
        [class.bg-slate-500]="test.flag === 'unknown'"
        [style.width.%]="rangePercent"
      ></div>
    </div>
    <span class="text-xs text-slate-500">Range: {{ test.ref_display }}</span>
  </div>

  <!-- Previous value -->
  <div *ngIf="test.previous" class="text-xs text-slate-500 flex items-center gap-1">
    <i class="pi pi-history text-xs"></i>
    <span>Prev: {{ test.previous.value_text }}<span *ngIf="test.unit"> {{ test.unit }}</span><span class="text-slate-600 mx-1">·</span>{{ test.previous.report_date | date:'dd MMM yy' }}</span>
  </div>
</div>
