<div class="space-y-8">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-white">Dashboard</h1>
      <p class="text-slate-400 text-sm mt-1">Latest health test results</p>
    </div>
    <p-button
      icon="pi pi-refresh"
      [text]="true"
      severity="secondary"
      (onClick)="load()"
      [loading]="loading"
      pTooltip="Refresh"
    />
  </div>

  <!-- Search + flag filter -->
  <div *ngIf="!loading && categories.length > 0" class="flex gap-3">
    <p-iconfield class="flex-1">
      <p-inputicon styleClass="pi pi-search" />
      <input
        pInputText
        type="text"
        [(ngModel)]="searchQuery"
        placeholder="Search tests by name or key..."
        class="w-full"
      />
    </p-iconfield>
    <p-multiselect
      [(ngModel)]="selectedFlags"
      [options]="flagOptions"
      optionLabel="label"
      optionValue="value"
      placeholder="All"
      [showClear]="true"
      [style]="{ minWidth: '180px' }"
      (onChange)="cdr.detectChanges()"
      (onClear)="selectedFlags = []; cdr.detectChanges()"
    >
      <ng-template pTemplate="item" let-opt>
        <div class="flex items-center gap-2">
          <span
            class="inline-block w-2 h-2 rounded-full"
            [class.bg-green-500]="opt.severity === 'success'"
            [class.bg-red-500]="opt.severity === 'danger'"
            [class.bg-yellow-500]="opt.severity === 'warn'"
            [class.bg-slate-500]="opt.severity === 'secondary'"
          ></span>
          <span>{{ opt.label }}</span>
        </div>
      </ng-template>
    </p-multiselect>
  </div>

  <!-- Loading skeletons -->
  <div *ngIf="loading" class="space-y-8">
    <div *ngFor="let _ of [1,2,3]" class="space-y-4">
      <p-skeleton width="200px" height="24px" />
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
        <p-skeleton *ngFor="let __ of [1,2,3,4]" height="120px" borderRadius="12px" />
      </div>
    </div>
  </div>

  <!-- Empty state (no data) -->
  <div *ngIf="!loading && categories.length === 0" class="text-center py-20">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-slate-800 mb-4">
      <i class="pi pi-chart-bar text-slate-500 text-2xl"></i>
    </div>
    <h3 class="text-white font-semibold text-lg">No test results yet</h3>
    <p class="text-slate-400 mt-2">Upload a health report PDF to get started</p>
    <p-button
      label="Upload Report"
      icon="pi pi-upload"
      styleClass="mt-4"
      routerLink="/health-tests"
    />
  </div>

  <!-- No filter matches -->
  <div *ngIf="!loading && categories.length > 0 && filteredCategories.length === 0" class="text-center py-16">
    <i class="pi pi-filter-slash text-slate-600 text-3xl"></i>
    <p class="text-slate-400 mt-3">No tests match the current filters</p>
    <p-button
      label="Clear filters"
      [text]="true"
      severity="secondary"
      size="small"
      styleClass="mt-2"
      (onClick)="searchQuery = ''; selectedFlags = []"
    />
  </div>

  <!-- Categories -->
  <div *ngFor="let cat of filteredCategories" class="space-y-4">
    <div class="flex items-center gap-3">
      <h2 class="text-base font-semibold text-slate-200">{{ cat.category }}</h2>
      <div class="flex-1 h-px bg-slate-700/50"></div>
      <span class="text-xs text-slate-500">{{ cat.tests.length }} tests</span>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
      <app-test-card
        *ngFor="let test of cat.tests"
        [test]="test"
        (infoClick)="openHistory(test)"
      />
    </div>
  </div>
</div>

<!-- History Dialog -->
<app-test-history-dialog
  [visible]="historyDialogVisible"
  [testKey]="historyTestKey"
  [testName]="historyTestName"
  (close)="closeHistory()"
/>
