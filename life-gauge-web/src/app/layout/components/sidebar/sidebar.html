<!-- Mobile backdrop -->
<div
  *ngIf="mobileOpen"
  class="fixed inset-0 bg-black/50 z-20 lg:hidden"
  (click)="mobileClose.emit()"
></div>

<!-- Sidebar -->
<aside
  class="fixed top-0 left-0 h-full z-30 flex flex-col transition-all duration-300 bg-slate-900 border-r border-slate-700/50"
  [class.w-64]="!collapsed"
  [class.w-16]="collapsed"
  [ngClass]="{ '-translate-x-full': !mobileOpen, 'translate-x-0': mobileOpen, 'lg:translate-x-0': true }"
>
  <!-- Logo / Brand -->
  <div class="flex items-center h-16 border-b border-slate-700/50 shrink-0" [class.px-4]="!collapsed" [class.px-2]="collapsed">
    <div class="flex items-center gap-3 overflow-hidden min-w-0 flex-1">
      <img
        src="assets/logo.svg"
        alt="Life Gauge"
        class="w-8 h-8 shrink-0"
        [class.cursor-pointer]="collapsed"
        (click)="collapsed && toggleCollapse.emit()"
        [pTooltip]="collapsed ? 'Expand' : ''"
        tooltipPosition="right"
      />
      <span *ngIf="!collapsed" class="font-bold text-white text-lg whitespace-nowrap">Life Gauge</span>
    </div>
    <button
      *ngIf="!collapsed"
      class="hidden lg:flex items-center justify-center w-7 h-7 rounded text-slate-400 hover:text-white hover:bg-slate-700 transition-colors shrink-0"
      (click)="toggleCollapse.emit()"
      pTooltip="Collapse"
      tooltipPosition="right"
    >
      <i class="pi pi-chevron-left text-xs"></i>
    </button>
  </div>

  <!-- Nav items -->
  <nav class="flex-1 py-4 overflow-y-auto overflow-x-hidden">
    <ul class="space-y-1 px-2">
      <li *ngFor="let item of navItems">
        <a
          [routerLink]="item.route"
          routerLinkActive="!bg-blue-600/20 !text-blue-400 !border-blue-500/50"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-white hover:bg-slate-700/50 border border-transparent transition-all cursor-pointer no-underline"
          (click)="onNavClick()"
          [pTooltip]="collapsed ? item.label : ''"
          tooltipPosition="right"
        >
          <i [class]="item.icon + ' text-base shrink-0'"></i>
          <span *ngIf="!collapsed" class="text-sm font-medium whitespace-nowrap">{{ item.label }}</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Logout -->
  <div class="p-2 border-t border-slate-700/50 shrink-0">
    <button
      class="flex items-center gap-3 w-full px-3 py-2.5 rounded-lg text-slate-400 hover:text-red-400 hover:bg-red-400/10 transition-colors"
      (click)="logout()"
      [pTooltip]="collapsed ? 'Logout' : ''"
      tooltipPosition="right"
    >
      <i class="pi pi-sign-out text-base shrink-0"></i>
      <span *ngIf="!collapsed" class="text-sm font-medium whitespace-nowrap">Logout</span>
    </button>
  </div>
</aside>
