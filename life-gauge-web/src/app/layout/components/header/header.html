<header class="fixed top-0 right-0 left-0 h-16 z-20 flex items-center px-4 gap-3 bg-slate-900/95 backdrop-blur border-b border-slate-700/50"
  [class.lg:pl-68]="!sidebarCollapsed"
  [class.lg:pl-20]="sidebarCollapsed">

  <!-- Mobile hamburger -->
  <button
    class="lg:hidden flex items-center justify-center w-9 h-9 rounded-lg text-slate-400 hover:text-white hover:bg-slate-700 transition-colors"
    (click)="toggleMobileSidebar.emit()"
  >
    <i class="pi pi-bars text-base"></i>
  </button>

  <!-- Page title placeholder - filled by router -->
  <div class="flex-1"></div>

  <!-- User avatar -->
  <p-avatar
    [label]="userInitials"
    shape="circle"
    styleClass="bg-blue-600 text-white font-semibold cursor-pointer"
    size="normal"
    [pTooltip]="currentUser?.name || ''"
    tooltipPosition="bottom"
  />
</header>
